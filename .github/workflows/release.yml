name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cp -r dist/* ../src/vrt/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build macOS app
        run: |
          cd build
          pyinstaller vrt-macos.spec

      - name: Zip app
        run: |
          cd build/dist
          zip -r ../../VRT-macos.zip VRT.app

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: VRT-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          Copy-Item -Recurse -Force dist/* ../src/vrt/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build Windows app
        run: |
          cd build
          pyinstaller vrt-windows.spec

      - name: Zip app
        run: |
          Compress-Archive -Path build/dist/VRT -DestinationPath VRT-windows.zip

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: VRT-windows.zip
